name: Generate RSS

on:
  schedule:
    # 每天 UTC 0:00、8:00、16:00 各跑一次（北京时间 8:00、16:00、0:00）
    - cron: "0 0,8,16 * * *"
  workflow_dispatch: # 支持手动触发
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/generate-rss.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许 push 更新后的 RSS 文件
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Optional config from repo
        run: |
          if [ -f scripts/config.yaml ]; then
            echo "Using scripts/config.yaml"
          else
            echo "No config.yaml, script will use defaults/env"
          fi

      - name: Generate RSS
        run: python scripts/generate_rss.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update RSS feeds [automated]"
            git push
          else
            echo "No RSS files changed, skip commit"
          fi
