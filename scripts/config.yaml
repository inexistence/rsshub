# 复制为 config.yaml 并填写你的数据源
# 支持多个网页源，每个源生成一份 RSS（仅 type: html）

# defaults：所有 feed 共用的默认值。每个 feeds 项里的 feed 会覆盖同名字段。
# 例如 link、language 写在这里一次即可，各 feed 只写各自不同的 title、description。
# source.selectors 下可写 summary（可选）：文章概要，输出为条目的 <description>。
defaults:
  feed:
    link: "https://inexistence.github.io/rsshub"
    language: "zh-CN"

# 多源列表：每个项生成一个 XML 文件
feeds:
  - output: claude.xml
    feed:
      title: "Claude Blog"
      description: "Product news and best practices for teams building with Claude"
    source:
      type: html
      url: "https://claude.com/blog"
      item_selector: "article.card_blog_list_wrap"
      selectors:
        title: "h3.card_blog_list_title"
        link: "a[href*='/blog/']@href"
        published: "div[fs-list-field=date]"

  - output: anthropic-engineering.xml
    feed:
      title: "Engineering at Anthropic"
      description: "Inside the team building reliable AI systems"
      link: "https://www.anthropic.com/engineering"
    source:
      type: html
      url: "https://www.anthropic.com/engineering"
      item_selector: "article[class*='ArticleList']"
      selectors:
        title: "h2|h3"
        link: "a[href*='/engineering/']@href"
        published: "div[class*='__date']"

  # Google Play Console 公告（政策与功能更新）
  - output: google-play-announcements.xml
    feed:
      title: "Google Play Announcements"
      description: "Play Console policy and product announcements"
      link: "https://support.google.com/googleplay/android-developer/announcements/13412212"
    source:
      type: html
      url: "https://support.google.com/googleplay/android-developer/announcements/13412212"
      item_selector: "li.announcement__post"
      selectors:
        title: "h2"
        link: "a[href*='/answer/']@href"
        summary: "div.announcement__post-body"

  # GitHub Trending 今日热门仓库
  - output: github-trending.xml
    feed:
      title: "GitHub Trending"
      description: "Trending repositories on GitHub today"
      link: "https://github.com/trending"
    source:
      type: html
      url: "https://github.com/trending"
      item_selector: "article"
      selectors:
        title: "h2 a"
        link: "a[href*='/']@href"
        summary: "p"
